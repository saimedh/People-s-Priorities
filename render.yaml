services:
  - type: web
    name: peoples-priorities
    env: node
    buildCommand: npm install && npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: node server/server.js
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
      - key: ADMIN_TOKEN
        value: admin123
      - key: TINYFISH_API_KEY
        sync: false
