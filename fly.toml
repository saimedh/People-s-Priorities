app = "peoples-priorities"
primary_region = "sin" # Singapore region, or change to bom (Mumbai) if available

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200
